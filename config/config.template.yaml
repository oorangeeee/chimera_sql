# ChimeraSQL Configuration Template
# Copy this file to config.yaml and fill in your actual values:
#   cp config.template.yaml config.yaml

# Oracle Database
oracle:
  host: "localhost"
  port: 1521
  service_name: "XEPDB1"
  user: "your_username"
  password: "your_password"

# SQLite Database
sqlite:
  db_path: "data/test.db"

# Fuzzing Parameters
fuzzing:
  seed_dir: "data/seeds"

# Mutation (Capability Profile + Policy)
mutation:
  builtin_rules:
    numeric_boundary_values:
      - "-1"
      - "0"
      - "1"
      - "9999999"
      - "2147483647"
      - "9223372036854775807"
      - "-9999999"

  profiles:
    oracle_21c:
      dbms: "oracle"
      version: "21c"
      features:
        - "recursive_cte"
        - "json_value"
        - "window_functions"
        - "except_op"
        - "decode"
        - "nvl2"
        - "median"
        - "except_all"

  policies:
    balanced_default:
      max_mutations_per_seed: 3

# 项目已对接的数据库类型
databases:
  oracle:
    db_type: "oracle"            # ConnectorFactory.create() 的参数
    sqlglot_dialect: "oracle"    # SQLGlot 方言名，用于转译 + 变异能力画像
  sqlite:
    db_type: "sqlite"
    sqlglot_dialect: "sqlite"
